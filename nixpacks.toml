[phases.setup]
nixPkgs = ["php82", "php82Extensions.gd", "php82Extensions.zip", "php82Extensions.iconv", "php82Extensions.simplexml", "php82Extensions.xmlreader", "php82Extensions.xmlwriter", "php82Extensions.zlib", "php82Extensions.pdo_mysql", "php82Extensions.mysqli", "php82Extensions.curl", "php82Extensions.mbstring", "php82Extensions.openssl", "nodejs_20", "npm"]
aptPkgs = ["libpng-dev", "libjpeg-dev", "libfreetype-dev", "libzip-dev"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm ci", "npm run build"]

[phases.build]
cmds = ["php artisan config:clear"]

[start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host 0.0.0.0 --port $PORT"

[variables]
PORT = "8000"